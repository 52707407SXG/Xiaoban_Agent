#
# docker-compose.windows.yml — Windows Docker Desktop compatible
#
# Differences from docker-compose.yml:
#   - Removes `network_mode: host` (not supported on Docker Desktop for Windows)
#   - Uses explicit port mappings instead
#   - Uses Windows-style volume path for ~/.xiaoban
#
# Usage:
#   docker compose -f docker-compose.windows.yml up -d
#
services:
  gateway:
    image: 52707407SXG/xiaoban-agent:latest
    container_name: xiaoban
    restart: unless-stopped
    volumes:
      - ${USERPROFILE}/.xiaoban:/opt/data
    environment:
      - XIAOBAN_UID=10000
      - XIAOBAN_GID=10000
    command: ["gateway", "run"]

  dashboard:
    image: 52707407SXG/xiaoban-agent:latest
    container_name: xiaoban-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ${USERPROFILE}/.xiaoban:/opt/data
    environment:
      - XIAOBAN_UID=10000
      - XIAOBAN_GID=10000
      - XIAOBAN_DASHBOARD_HOST=0.0.0.0
    ports:
      - "127.0.0.1:9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
